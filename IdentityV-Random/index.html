<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>第五人格隨機抽取器</title>

    <!-- CSS -->
    <link
        rel="stylesheet"
        href="style.css"
    >
</head>

<body>

    <div class="main-container">

        <!-- 標題 -->
        <header class="header">
            <h1>第五人格隨機抽取器</h1>
        </header>

        <div class="grid-layout">

            <!-- 左側 -->
            <div class="left-panel">

                <!-- 角色禁用 -->
                <section class="panel">

                    <h2>角色禁用</h2>

                    <!-- 求生者 -->
                    <div class="section-title">
                        求生者
                    </div>

                    <div class="button-group">

                        <button
                            onclick="disableAllSurvivors()"
                        >
                            全部禁用
                        </button>

                        <button
                            onclick="enableAllSurvivors()"
                        >
                            全部解除
                        </button>

                    </div>

                    <div
                        id="survivorList"
                        class="checkbox-list"
                    ></div>

                    <hr>

                    <!-- 監管者 -->
                    <div class="section-title">
                        監管者
                    </div>

                    <div class="button-group">

                        <button
                            onclick="disableAllHunters()"
                        >
                            全部禁用
                        </button>

                        <button
                            onclick="enableAllHunters()"
                        >
                            全部解除
                        </button>

                    </div>

                    <div
                        id="hunterList"
                        class="checkbox-list"
                    ></div>

                </section>


                <!-- 地圖禁用 -->
                <section class="panel">

                    <h2>地圖禁用</h2>

                    <div class="button-group">

                        <button
                            onclick="disableAllMaps()"
                        >
                            全部禁用
                        </button>

                        <button
                            onclick="enableAllMaps()"
                        >
                            全部解除
                        </button>

                    </div>

                    <div
                        id="mapList"
                        class="checkbox-list"
                    ></div>

                </section>

            </div>


            <!-- 中間 -->
            <div class="middle-panel">

                <!-- 開始抽取 -->
                <section class="panel">

                    <h2>開始抽取</h2>

                    <button id="genBtn" class="start-btn" onclick="startRandomDraw()">開始抽取</button>


                </section>


                <!-- 抽取結果 -->
<section class="panel">

    <h2>抽取結果</h2>

    <div id="resultArea">
        <!-- 用來顯示原本抽出的求生者/監管者清單 -->
        <div id="characterResult" style="font-size: 1.1rem; color: #ffcc00; margin-bottom: 12px; line-height: 1.6;">
            尚未抽取
        </div>
        
        <hr style="border: 0; border-top: 1px dashed #444; margin: 10px 0;">

        <!-- 【新加入】用來顯示核心大天賦 -->
        <div id="talentUltimate" style="color: #e67e22; font-weight: bold; margin-bottom: 8px; font-size: 1.05rem;"></div>
        
        <!-- 【新加入】用來顯示 130 點雙欄排版的天賦明細 -->
        <ul id="talentDetails" style="list-style: none; padding: 0; margin: 0; font-size: 0.9rem; color: #bbbbbb; display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px 15px;"></ul>
    </div>

</section>



                <!-- 地圖 -->
                <section class="panel">

                    <h2>地圖資訊</h2>

                    <div id="mapName">
                        尚未抽取
                    </div>

                    <div id="boardArea">
                    </div>

                </section>

            </div>
            <!-- 右側 -->
<div class="right-panel">

    <section class="panel">

        <h2>分享與讀取結果</h2>

        <!-- 這個欄位會用來自動顯示程式碼，或讓別人把程式碼貼進來 -->
        <input
            type="text"
            id="roomCode"
            placeholder="抽取後自動生成代碼 / 在此貼上代碼"
        >

        <div class="button-group">

            <!-- 房長抽完之後點這顆 -->
            <button
                onclick="copyRoomCode()"
                style="background: linear-gradient(135deg, #b8860b, #8b6508);"
            >
                📋 複製結果代碼
            </button>

            <!-- 隊友貼上之後點這顆 -->
            <button
                onclick="loadRoomCode()"
                style="background: linear-gradient(135deg, #006400, #004d00);"
            >
                📥 讀取他人代碼
            </button>

        </div>

        <div id="roomStatus" style="color: #bbbbbb; font-size: 0.9rem;">
            你可以點擊複製發給朋友，或貼上別人的代碼同步畫面。
        </div>

    </section>

</div>


        </div>

    </div>


    <!-- JS 載入順序很重要 -->

    <!-- 角色/地圖資料 -->
    <script src="js/data.js"></script>

    <!-- 人格樹 -->
    <script src="js/talentTreeData.js"></script>

    <!-- 主程式 -->
    <script src="js/script.js"></script>

</body>
</html>
